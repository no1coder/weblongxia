name: Update Version

on:
  repository_dispatch:
    types: [new-release]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in index.html
        env:
          NEW_VERSION: ${{ github.event.client_payload.version }}
        run: |
          # Replace OSS download URLs (e.g., OpenClawX-Full_0.3.2_x64-setup.exe)
          sed -i "s|OpenClawX-Full_[0-9]*\.[0-9]*\.[0-9]*_|OpenClawX-Full_${NEW_VERSION}_|g" index.html
          # Replace "vX.Y.Z · 开源免费"
          sed -i "s|v[0-9]*\.[0-9]*\.[0-9]* · 开源免费|v${NEW_VERSION} · 开源免费|g" index.html
          # Replace download-version paragraph
          sed -i "s|class=\"download-version\">v[0-9]*\.[0-9]*\.[0-9]*|class=\"download-version\">v${NEW_VERSION}|g" index.html

      - name: Commit and push
        env:
          NEW_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git push
